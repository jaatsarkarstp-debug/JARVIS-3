<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Sandbox Racer</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: monospace;
        }
        canvas {
            background-color: #2b2b2b;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            /* Road jaisa feel dene ke liye */
            border-left: 5px dashed white;
            border-right: 5px dashed white;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // 1. Load Images (Ye naya part hai)
    const playerImg = new Image();
    playerImg.src = "player_car.png"; // Aapki car ki image file ka naam

    const enemyImg = new Image();
    enemyImg.src = "enemy_car.png";   // Enemy car ki image file ka naam

    // Cars ab thodi rectangle hoti hain, toh size us hisaab se set kiya hai
    let player = { x: 375, y: 500, width: 50, height: 90, speed: 7 };
    let enemy = { x: Math.random() * 750, y: -100, width: 50, height: 90, speed: 5 };
    
    let score = 0;
    let gameOver = false;

    const keys = {};
    window.addEventListener("keydown", (e) => { keys[e.key] = true; });
    window.addEventListener("keyup", (e) => { keys[e.key] = false; });

    function update() {
        if (gameOver) return;

        // Move Player
        if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
        if (keys["ArrowRight"] && player.x < canvas.width - player.width) player.x += player.speed;
        if (keys["ArrowUp"] && player.y > 0) player.y -= player.speed;
        if (keys["ArrowDown"] && player.y < canvas.height - player.height) player.y += player.speed;

        // Move Enemy
        enemy.y += enemy.speed;

        // Score Points & Respawn
        if (enemy.y > canvas.height) {
            enemy.y = -100;
            enemy.x = Math.random() * (canvas.width - enemy.width);
            score++;
            
            if (score % 5 === 0) enemy.speed++;
        }

        // Check Collision
        if (player.x < enemy.x + enemy.width &&
            player.x + player.width > enemy.x &&
            player.y < enemy.y + enemy.height &&
            player.y + player.height > enemy.y) {
            gameOver = true;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 2. Draw Images instead of rectangles
        ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
        ctx.drawImage(enemyImg, enemy.x, enemy.y, enemy.width, enemy.height);

        ctx.fillStyle = "white";
        ctx.font = "30px monospace";
        ctx.fillText("Score: " + score, 15, 40);

        if (gameOver) {
            ctx.fillStyle = "white";
            ctx.font = "40px monospace";
            ctx.fillText("CRASHED!", canvas.width / 2 - 90, canvas.height / 2);
            ctx.font = "20px monospace";
            ctx.fillText("Refresh the page to try again.", canvas.width / 2 - 175, canvas.height / 2 + 40);
        }
    }

    function gameLoop() {
        update();
        draw();
        
        if (!gameOver) {
            requestAnimationFrame(gameLoop);
        }
    }

    // Start only AFTER images load to prevent blank flickering
    playerImg.onload = () => {
        gameLoop();
    };
</script>

</body>
</html>
