<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Clone</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2b2b2b;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* The sky background color */
        canvas {
            background-color: #70c5ce; 
            border: 5px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let frames = 0;
    let score = 0;
    let gameOver = false;

    // 1. The Bird Object
    const bird = {
        x: 50, 
        y: 150, 
        width: 34, 
        height: 24,
        velocity: 0, 
        gravity: 0.25, // How fast it falls
        jumpForce: -5.5, // How high it jumps

        draw: function() {
            // Draw Bird Body (Yellow)
            ctx.fillStyle = "#f3c13a";
            ctx.fillRect(this.x, this.y, this.width, this.height);
            
            // Draw Bird Eye
            ctx.fillStyle = "white";
            ctx.fillRect(this.x + 20, this.y + 4, 10, 10);
            ctx.fillStyle = "black";
            ctx.fillRect(this.x + 24, this.y + 8, 4, 4);
            
            // Draw Beak (Orange)
            ctx.fillStyle = "#e86101";
            ctx.fillRect(this.x + 34, this.y + 10, 10, 8);
        },
        
        flap: function() {
            this.velocity = this.jumpForce;
        },
        
        update: function() {
            // Apply gravity
            this.velocity += this.gravity;
            this.y += this.velocity;
            
            // Hit the floor
            if (this.y + this.height >= canvas.height) {
                this.y = canvas.height - this.height;
                gameOver = true;
            }
            // Hit the ceiling
            if (this.y <= 0) {
                this.y = 0;
                this.velocity = 0;
            }
        }
    };

    // 2. The Pipes Object
    const pipes = {
        items: [], 
        width: 50, 
        gap: 130, // Space between top and bottom pipe
        dx: 2, // Speed at which pipes move left
        
        draw: function() {
            for (let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                ctx.fillStyle = "#74bf2e"; // Green pipes
                
                // Top Pipe
                ctx.fillRect(p.x, 0, this.width, p.top);
                // Bottom Pipe
                ctx.fillRect(p.x, canvas.height - p.bottom, this.width, p.bottom);
            }
        },
        
        update: function() {
            // Add new pipe every 100 frames
            if (frames % 100 === 0) {
                // Randomize pipe gap position
                let topPipeHeight = Math.random() * (canvas.height - this.gap - 100) + 50;
                let bottomPipeHeight = canvas.height - this.gap - topPipeHeight;
                
                this.items.push({ 
                    x: canvas.width, 
                    top: topPipeHeight, 
                    bottom: bottomPipeHeight, 
                    passed: false 
                });
            }
            
            for (let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                p.x -= this.dx; // Move pipe left

                // Check Collision with Bird
                if (bird.x + bird.width > p.x && bird.x < p.x + this.width) {
                    if (bird.y < p.top || bird.y + bird.height > canvas.height - p.bottom) {
                        gameOver = true; // Hit a pipe
                    }
                }

                // Increase Score
                if (p.x + this.width < bird.x && !p.passed) {
                    score++;
                    p.passed = true;
                }

                // Remove pipes that have gone off-screen
                if (p.x + this.width < 0) {
                    this.items.shift();
                    i--;
                }
            }
        },
        
        reset: function() {
            this.items = [];
        }
    };

    // 3. UI and Score
    function drawScore() {
        ctx.fillStyle = "white";
        ctx.font = "bold 40px sans-serif";
        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
        
        // Center the score at the top
        ctx.fillText(score, canvas.width / 2 - 15, 50);
        ctx.strokeText(score, canvas.width / 2 - 15, 50);

        if (gameOver) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "white";
            ctx.font = "bold 30px sans-serif";
            ctx.fillText("GAME OVER", canvas.width / 2 - 90, canvas.height / 2 - 20);
            
            ctx.font = "16px sans-serif";
            ctx.fillText("Click or press Space to restart", canvas.width / 2 - 110, canvas.height / 2 + 20);
        }
    }

    // 4. Main Game Loop Functions
    function update() {
        if (!gameOver) {
            bird.update();
            pipes.update();
        }
    }

    function draw() {
        // Clear screen with sky color
        ctx.fillStyle = "#70c5ce";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        pipes.draw();
        bird.draw();
        drawScore();
    }

    function loop() {
        update();
        draw();
        frames++;
        requestAnimationFrame(loop);
    }

    // 5. Controls (Spacebar or Mouse Click)
    function handleInput() {
        if (gameOver) {
            // Reset Game
            bird.y = 150;
            bird.velocity = 0;
            pipes.reset();
            score = 0;
            frames = 0;
            gameOver = false;
        } else {
            // Make Bird Jump
            bird.flap();
        }
    }

    window.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
            handleInput();
        }
    });
    
    window.addEventListener("mousedown", handleInput);

    // Start the game
    loop();
</script>

</body>
</html>
