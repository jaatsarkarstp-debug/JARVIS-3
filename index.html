<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Sandbox Racer</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: monospace;
        }
        canvas {
            background-color: #1e1e1e;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Player and Enemy Settings
    let player = { x: 375, y: 500, size: 50, speed: 7 };
    let enemy = { x: Math.random() * 750, y: -50, size: 50, speed: 5 };
    
    let score = 0;
    let gameOver = false;

    // Track which keys are currently pressed
    const keys = {};
    window.addEventListener("keydown", (e) => { keys[e.key] = true; });
    window.addEventListener("keyup", (e) => { keys[e.key] = false; });

    function update() {
        if (gameOver) return;

        // 1. Move Player
        if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
        if (keys["ArrowRight"] && player.x < canvas.width - player.size) player.x += player.speed;
        if (keys["ArrowUp"] && player.y > 0) player.y -= player.speed;
        if (keys["ArrowDown"] && player.y < canvas.height - player.size) player.y += player.speed;

        // 2. Move Enemy
        enemy.y += enemy.speed;

        // 3. Score Points & Respawn
        if (enemy.y > canvas.height) {
            enemy.y = -50;
            enemy.x = Math.random() * (canvas.width - enemy.size);
            score++;
            
            // Level up speed
            if (score % 5 === 0) enemy.speed++;
        }

        // 4. Check Collision (Hitbox Math)
        if (player.x < enemy.x + enemy.size &&
            player.x + player.size > enemy.x &&
            player.y < enemy.y + enemy.size &&
            player.y + player.size > enemy.y) {
            gameOver = true;
        }
    }

    function draw() {
        // Clear screen (redraw background)
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Player (Blue)
        ctx.fillStyle = "#3296ff";
        ctx.fillRect(player.x, player.y, player.size, player.size);

        // Draw Enemy (Red)
        ctx.fillStyle = "#dc3232";
        ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);

        // Draw Score
        ctx.fillStyle = "white";
        ctx.font = "30px monospace";
        ctx.fillText("Score: " + score, 15, 40);

        // Draw Game Over Text
        if (gameOver) {
            ctx.fillStyle = "white";
            ctx.font = "40px monospace";
            ctx.fillText("CRASHED!", canvas.width / 2 - 90, canvas.height / 2);
            ctx.font = "20px monospace";
            ctx.fillText("Refresh the page to try again.", canvas.width / 2 - 175, canvas.height / 2 + 40);
        }
    }

    // Main Game Loop (Runs at the monitor's refresh rate, usually 60 FPS)
    function gameLoop() {
        update();
        draw();
        
        if (!gameOver) {
            requestAnimationFrame(gameLoop);
        }
    }

    // Start the game
    gameLoop();
</script>

</body>
</html>
