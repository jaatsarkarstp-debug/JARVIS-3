<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Blast Ultra - Premium 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #05050a; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        
        // Use Perspective Camera for deep 3D immersion
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(3.5, -2, 12); // Tilted view
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Sharp graphics
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(3.5, 3.5, 0);

        // --- WORLD-CLASS LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        // Add colored point lights for a cyberpunk/neon vibe
        const blueLight = new THREE.PointLight(0x0055ff, 2, 20);
        blueLight.position.set(-2, 8, 5);
        scene.add(blueLight);

        const pinkLight = new THREE.PointLight(0xff00aa, 2, 20);
        pinkLight.position.set(9, -2, 5);
        scene.add(pinkLight);

        // --- PREMIUM GLASS/GEM MATERIALS ---
        // This material creates a beautiful, refractive glass look
        const glassMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0.1,
            transmission: 0.9, // Makes it look like glass
            thickness: 0.5,
            envMapIntensity: 1.0,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1
        });

        // --- BUILD THE NETWORK (GRID) ---
        const blockGeo = new THREE.BoxGeometry(0.9, 0.9, 0.9); // Slightly rounded look
        const gridGroup = new THREE.Group();

        // Adding some random colors for testing the "network" look
        const neonColors = [0xff2020, 0x20ff30, 0x2060ff, 0xffcc20];

        for (let x = 0; x < 8; x++) {
            for (let y = 0; y < 8; y++) {
                // Background empty grid slot (Dark Glass)
                const emptySlotMat = new THREE.MeshStandardMaterial({ 
                    color: 0x111115, roughness: 0.8, metalness: 0.2 
                });
                const slot = new THREE.Mesh(blockGeo, emptySlotMat);
                slot.position.set(x, y, -0.5);
                slot.scale.set(0.95, 0.95, 0.1);
                gridGroup.add(slot);

                // Add active blocks in a random network pattern
                if (Math.random() > 0.6) {
                    // Outer Glass Shell
                    const block = new THREE.Mesh(blockGeo, glassMaterial);
                    block.position.set(x, y, 0);
                    
                    // Inner Glowing Core
                    const randomColor = neonColors[Math.floor(Math.random() * neonColors.length)];
                    const coreMat = new THREE.MeshBasicMaterial({ color: randomColor });
                    const core = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), coreMat);
                    
                    block.add(core); // Put the glow inside the glass
                    gridGroup.add(block);
                }
            }
        }
        
        scene.add(gridGroup);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Rotate the entire grid slightly for a dramatic effect
        function animate() {
            requestAnimationFrame(animate);
            // Slowly moving lights
            blueLight.position.x = Math.sin(Date.now() * 0.001) * 5 + 3.5;
            pinkLight.position.y = Math.cos(Date.now() * 0.001) * 5 + 3.5;
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
